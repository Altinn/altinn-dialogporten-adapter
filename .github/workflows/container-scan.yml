name: Notifications scan

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
  schedule:
    - cron: '0 8 * * 1,4'

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    # TEMP workaround for reactiveui/refit#2114: Refit 10.1.6's signing cert (CN=Glenn Watson)
    # was revoked upstream 2026-06-02, making Linux `dotnet restore` fail with NU3012. Offline
    # revocation mode keeps signature/chain verification but skips the live CRL check. Remove
    # once Refit republishes 10.1.x with a valid signature. Revert tracked in #4049.
    env:
      NUGET_CERT_REVOCATION_MODE: offline
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build the Docker image
        run: docker build . --tag altinn-dialogporten-adapter:${{github.sha}}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'altinn-dialogporten-adapter:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db,aquasec/trivy-db,ghcr.io/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db,aquasec/trivy-java-db,ghcr.io/aquasecurity/trivy-java-db
